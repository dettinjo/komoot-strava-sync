# Backend-only self-hosted deployment.
# Copy .env.selfhosted.template to .env.selfhosted before starting.

services:
  api:
    build: ./backend
    restart: unless-stopped
    ports: ["8000:8000"]
    env_file: .env.selfhosted
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    build: ./backend
    command: python -m arq app.jobs.worker.WorkerSettings
    restart: unless-stopped
    env_file: .env.selfhosted
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes: [postgres_data:/var/lib/postgresql/data]
    environment:
      POSTGRES_DB: komoot_strava_sync
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d komoot_strava_sync"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
